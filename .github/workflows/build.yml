name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - arch: x64
            platform: x64
            msbuild_platform: x64
            openssl_dir: C:\Program Files\OpenSSL
            openssl_configure: VC-WIN64A
            dokan_machine: x64
            dokan_lib_dir: lib
            artifact_name: cppcryptfs-x64-release
            output_dir: x64\Release
          - arch: x86
            platform: x86
            msbuild_platform: x86
            openssl_dir: C:\Program Files (x86)\OpenSSL
            openssl_configure: VC-WIN32
            dokan_machine: x86
            dokan_lib_dir: x86\lib
            artifact_name: cppcryptfs-x86-release
            output_dir: Win32\Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup MSVC dev environment (${{ matrix.arch }})
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Install Dokany 2.3.1.1000 SDK (headers from source + import lib from def)
        shell: pwsh
        run: |
          $sdkRoot = "C:\Program Files\Dokan\Dokan Library-2.3.1"
          New-Item -ItemType Directory -Force -Path "$sdkRoot\include\dokan", "$sdkRoot\${{ matrix.dokan_lib_dir }}" | Out-Null

          # Clone source for headers (skip if already present from a previous matrix job on this runner)
          if (-not (Test-Path "C:\git\dokany")) {
            git clone --depth 1 --branch v2.3.1.1000 https://github.com/dokan-dev/dokany.git C:\git\dokany
          }
          Copy-Item "C:\git\dokany\dokan\*.h" -Destination "$sdkRoot\include\dokan\" -Force
          # dokan.h includes "public.h" which lives in sys/ (not dokan/) in the source tree
          $pubH = Get-ChildItem -Path "C:\git\dokany" -Filter "public.h" -Recurse | Select-Object -First 1
          if (-not $pubH) { throw "public.h not found in dokany source" }
          Copy-Item $pubH.FullName -Destination "$sdkRoot\include\dokan\" -Force

          # Generate dokan2.lib import library for ${{ matrix.arch }}
          # x64: plain names (no stdcall decoration)
          # x86: decorated names _Func@N=Func so MSVC stdcall refs resolve to undecorated DLL exports
          if ("${{ matrix.arch }}" -eq "x86") {
            $defLines = @(
              "LIBRARY dokan2",
              "EXPORTS",
              "  _DokanInit@0=DokanInit",
              "  _DokanShutdown@0=DokanShutdown",
              "  _DokanMain@8=DokanMain",
              "  _DokanCreateFileSystem@12=DokanCreateFileSystem",
              "  _DokanWaitForFileSystemClosed@8=DokanWaitForFileSystemClosed",
              "  _DokanWaitForFileSystemClosedEx@8=DokanWaitForFileSystemClosedEx",
              "  _DokanReleaseFileSystem@4=DokanReleaseFileSystem",
              "  _DokanIsFileSystemRunning@4=DokanIsFileSystemRunning",
              "  _DokanRemoveMountPoint@4=DokanRemoveMountPoint",
              "  _DokanRemoveMountPointEx@8=DokanRemoveMountPointEx",
              "  _DokanOpenRequestorToken@4=DokanOpenRequestorToken",
              "  _DokanCloseHandle@4=DokanCloseHandle",
              "  _DokanNtStatusFromWin32@4=DokanNtStatusFromWin32",
              "  _DokanMapKernelToUserCreateFileFlags@28=DokanMapKernelToUserCreateFileFlags",
              "  _DokanGetVersion@0=DokanGetVersion",
              "  _DokanDriverVersion@0=DokanDriverVersion",
              "  _DokanResetTimeout@8=DokanResetTimeout",
              "  _DokanGetMountPointList@8=DokanGetMountPointList",
              "  _DokanReleaseMountPointList@4=DokanReleaseMountPointList",
              "  _DokanIsNameInExpression@12=DokanIsNameInExpression",
              "  _DokanNotifyCreate@12=DokanNotifyCreate",
              "  _DokanNotifyDelete@12=DokanNotifyDelete",
              "  _DokanNotifyUpdate@8=DokanNotifyUpdate",
              "  _DokanNotifyXAttrUpdate@8=DokanNotifyXAttrUpdate",
              "  _DokanNotifyRename@20=DokanNotifyRename"
            )
          } else {
            $defLines = @(
              "LIBRARY dokan2",
              "EXPORTS",
              "  DokanInit",
              "  DokanShutdown",
              "  DokanMain",
              "  DokanCreateFileSystem",
              "  DokanWaitForFileSystemClosed",
              "  DokanWaitForFileSystemClosedEx",
              "  DokanReleaseFileSystem",
              "  DokanIsFileSystemRunning",
              "  DokanRemoveMountPoint",
              "  DokanRemoveMountPointEx",
              "  DokanOpenRequestorToken",
              "  DokanCloseHandle",
              "  DokanNtStatusFromWin32",
              "  DokanMapKernelToUserCreateFileFlags",
              "  DokanGetVersion",
              "  DokanDriverVersion",
              "  DokanResetTimeout",
              "  DokanGetMountPointList",
              "  DokanReleaseMountPointList",
              "  DokanIsNameInExpression",
              "  DokanNotifyCreate",
              "  DokanNotifyDelete",
              "  DokanNotifyUpdate",
              "  DokanNotifyXAttrUpdate",
              "  DokanNotifyRename"
            )
          }
          $defPath = "$env:RUNNER_TEMP\dokan2-${{ matrix.arch }}.def"
          $defLines -join "`n" | Out-File -Encoding ascii $defPath
          lib.exe /def:"$defPath" /machine:${{ matrix.dokan_machine }} /out:"$sdkRoot\${{ matrix.dokan_lib_dir }}\dokan2.lib"
          if (-not (Test-Path "$sdkRoot\include\dokan\dokan.h")) { throw "dokan.h missing" }
          if (-not (Test-Path "$sdkRoot\${{ matrix.dokan_lib_dir }}\dokan2.lib"))  { throw "dokan2.lib missing" }
          Write-Host "Dokany SDK ready at $sdkRoot (${{ matrix.arch }})"

      - name: Check pre-installed OpenSSL (${{ matrix.arch }})
        id: check-openssl
        shell: pwsh
        run: |
          $lib = "${{ matrix.openssl_dir }}\lib\libcrypto.lib"
          if (Test-Path $lib) {
            Write-Host "OpenSSL static lib found — skipping build"
            echo "found=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "OpenSSL static lib not found at $lib — will build from source"
            echo "found=false" >> $env:GITHUB_OUTPUT
          }

      - name: Install NASM (OpenSSL build dep)
        if: steps.check-openssl.outputs.found != 'true'
        run: choco install nasm --no-progress -y

      - name: Build and install OpenSSL 3.0.13 (static, ${{ matrix.arch }})
        if: steps.check-openssl.outputs.found != 'true'
        shell: cmd
        run: |
          set "PATH=C:\Program Files\NASM;%PATH%"

          curl -fsSL https://www.openssl.org/source/openssl-3.0.13.tar.gz -o openssl.tar.gz
          tar xzf openssl.tar.gz
          cd openssl-3.0.13

          perl Configure ${{ matrix.openssl_configure }} no-shared ^
            --prefix="${{ matrix.openssl_dir }}" ^
            --openssldir="${{ matrix.openssl_dir }}"

          nmake
          nmake install_sw

      - name: Clone RapidJSON (headers only)
        run: git clone --depth 1 https://github.com/Tencent/rapidjson.git C:\git\rapidjson

      - name: Build cppcryptfs (Release|${{ matrix.msbuild_platform }})
        shell: cmd
        run: |
          msbuild cppcryptfs.sln ^
            /p:Configuration=Release ^
            /p:Platform=${{ matrix.msbuild_platform }} ^
            /p:PlatformToolset=v143 ^
            /m ^
            /v:minimal

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.output_dir }}\cppcryptfs.exe
            ${{ matrix.output_dir }}\cppcryptfsctl.exe
