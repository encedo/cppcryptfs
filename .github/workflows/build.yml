name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Sets up MSVC environment (cl.exe, nmake, lib, link) for all subsequent steps
      - name: Setup MSVC dev environment (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Dokany 2.3.1.1000 SDK (headers from source + import lib from def)
        shell: pwsh
        run: |
          $sdkRoot = "C:\Program Files\Dokan\Dokan Library-2.3.1"
          New-Item -ItemType Directory -Force -Path "$sdkRoot\include\dokan", "$sdkRoot\lib" | Out-Null

          # Clone source for headers only — no installer needed
          git clone --depth 1 --branch v2.3.1.1000 https://github.com/dokan-dev/dokany.git C:\git\dokany
          Copy-Item "C:\git\dokany\dokan\*.h" -Destination "$sdkRoot\include\dokan\"
          # dokan.h includes "public.h" which lives in sys/ (not dokan/) in the source tree
          $pubH = Get-ChildItem -Path "C:\git\dokany" -Filter "public.h" -Recurse | Select-Object -First 1
          if (-not $pubH) { throw "public.h not found in dokany source" }
          Copy-Item $pubH.FullName -Destination "$sdkRoot\include\dokan\"

          # Generate dokan2.lib import library from a .def file using lib.exe (from MSVC env)
          # Lists all public Dokany 2.x API exports; link will only pull in what cppcryptfs references
          # Array-join avoids PowerShell here-string syntax (which requires column-0 terminators
          # that conflict with YAML block scalar indentation rules).
          $defLines = @(
            "LIBRARY dokan2",
            "EXPORTS",
            "  DokanInit",
            "  DokanShutdown",
            "  DokanMain",
            "  DokanCreateFileSystem",
            "  DokanWaitForFileSystemClosed",
            "  DokanWaitForFileSystemClosedEx",
            "  DokanReleaseFileSystem",
            "  DokanIsFileSystemRunning",
            "  DokanRemoveMountPoint",
            "  DokanRemoveMountPointEx",
            "  DokanOpenRequestorToken",
            "  DokanCloseHandle",
            "  DokanNtStatusFromWin32",
            "  DokanMapKernelToUserCreateFileFlags",
            "  DokanGetVersion",
            "  DokanDriverVersion",
            "  DokanResetTimeout",
            "  DokanGetMountPointList",
            "  DokanReleaseMountPointList",
            "  DokanIsNameInExpression",
            "  DokanNotifyCreate",
            "  DokanNotifyDelete",
            "  DokanNotifyUpdate",
            "  DokanNotifyXAttrUpdate",
            "  DokanNotifyRename"
          )
          $defPath = "$env:RUNNER_TEMP\dokan2.def"
          $defLines -join "`n" | Out-File -Encoding ascii $defPath
          lib.exe /def:"$defPath" /machine:x64 /out:"$sdkRoot\lib\dokan2.lib"
          if (-not (Test-Path "$sdkRoot\include\dokan\dokan.h")) { throw "dokan.h missing" }
          if (-not (Test-Path "$sdkRoot\lib\dokan2.lib"))  { throw "dokan2.lib missing" }
          Write-Host "Dokany SDK ready at $sdkRoot"

      # windows-latest runners ship OpenSSL with static libs at C:\Program Files\OpenSSL.
      # Only build from source if libcrypto.lib is missing (should rarely happen).
      - name: Check pre-installed OpenSSL
        id: check-openssl
        shell: pwsh
        run: |
          $lib = "C:\Program Files\OpenSSL\lib\libcrypto.lib"
          if (Test-Path $lib) {
            Write-Host "OpenSSL static lib found — skipping build"
            echo "found=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "OpenSSL static lib not found at $lib — will build from source"
            echo "found=false" >> $env:GITHUB_OUTPUT
          }

      - name: Install NASM (OpenSSL build dep)
        if: steps.check-openssl.outputs.found != 'true'
        run: choco install nasm --no-progress -y

      - name: Build and install OpenSSL 3.0.13 (static, x64)
        if: steps.check-openssl.outputs.found != 'true'
        shell: cmd
        run: |
          set "PATH=C:\Program Files\NASM;%PATH%"

          curl -fsSL https://www.openssl.org/source/openssl-3.0.13.tar.gz -o openssl.tar.gz
          tar xzf openssl.tar.gz
          cd openssl-3.0.13

          perl Configure VC-WIN64A no-shared ^
            --prefix="C:\Program Files\OpenSSL" ^
            --openssldir="C:\Program Files\OpenSSL"

          nmake
          nmake install_sw

      - name: Clone RapidJSON (headers only)
        run: git clone --depth 1 https://github.com/Tencent/rapidjson.git C:\git\rapidjson

      - name: Build cppcryptfs (Release|x64)
        shell: cmd
        run: |
          msbuild cppcryptfs.sln ^
            /p:Configuration=Release ^
            /p:Platform=x64 ^
            /p:PlatformToolset=v143 ^
            /m ^
            /v:minimal

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cppcryptfs-x64-release
          path: |
            x64\Release\cppcryptfs.exe
            x64\Release\cppcryptfsctl.exe
