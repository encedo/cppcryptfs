name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Sets up MSVC environment (cl.exe, nmake, lib, link) for all subsequent steps
      - name: Setup MSVC dev environment (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # windows-latest runners ship OpenSSL with static libs at C:\Program Files\OpenSSL.
      # Only build from source if libcrypto.lib is missing (should rarely happen).
      - name: Check pre-installed OpenSSL
        id: check-openssl
        shell: pwsh
        run: |
          $lib = "C:\Program Files\OpenSSL\lib\libcrypto.lib"
          if (Test-Path $lib) {
            Write-Host "OpenSSL static lib found — skipping build"
            echo "found=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "OpenSSL static lib not found at $lib — will build from source"
            echo "found=false" >> $env:GITHUB_OUTPUT
          }

      - name: Install NASM (OpenSSL build dep)
        if: steps.check-openssl.outputs.found != 'true'
        run: choco install nasm --no-progress -y

      - name: Build and install OpenSSL 3.0.13 (static, x64)
        if: steps.check-openssl.outputs.found != 'true'
        shell: cmd
        run: |
          set "PATH=C:\Program Files\NASM;%PATH%"

          curl -fsSL https://www.openssl.org/source/openssl-3.0.13.tar.gz -o openssl.tar.gz
          tar xzf openssl.tar.gz
          cd openssl-3.0.13

          perl Configure VC-WIN64A no-shared ^
            --prefix="C:\Program Files\OpenSSL" ^
            --openssldir="C:\Program Files\OpenSSL"

          nmake
          nmake install_sw

      - name: Clone RapidJSON (headers only)
        run: git clone --depth 1 https://github.com/Tencent/rapidjson.git C:\git\rapidjson

      - name: Install Dokany 2.3.1.1000 SDK (headers + lib only, no driver)
        shell: pwsh
        run: |
          $url = "https://github.com/dokan-dev/dokany/releases/download/v2.3.1.1000/DokanSetup.exe"
          Invoke-WebRequest $url -OutFile "$env:RUNNER_TEMP\DokanSetup.exe"

          $layoutDir  = "$env:RUNNER_TEMP\dokany_layout"
          $msiExtract = "$env:RUNNER_TEMP\dokany_msi"
          New-Item -ItemType Directory -Force -Path $layoutDir, $msiExtract | Out-Null

          # DokanSetup.exe is a WiX Burn bundle; /layout extracts payload without installing
          $p = Start-Process -Wait -PassThru -FilePath "$env:RUNNER_TEMP\DokanSetup.exe" `
               -ArgumentList "/layout `"$layoutDir`""
          Write-Host "Layout exit code: $($p.ExitCode)"
          Write-Host "Layout contents:"; Get-ChildItem -Recurse $layoutDir | Select-Object FullName, Length

          # Find the largest MSI (the SDK/runtime one, not a tiny helper)
          $msi = Get-ChildItem -Recurse $layoutDir -Filter "*.msi" |
              Sort-Object Length -Descending | Select-Object -First 1
          if (-not $msi) { throw "No MSI found in WiX layout" }
          Write-Host "Using MSI: $($msi.FullName)"

          # msiexec /a = administrative install: extracts files without running driver setup
          $p2 = Start-Process -Wait -PassThru -FilePath msiexec `
                -ArgumentList "/a", "`"$($msi.FullName)`"", "/qn", "TARGETDIR=`"$msiExtract`""
          Write-Host "MSI extract exit code: $($p2.ExitCode)"

          $sdkRoot = "C:\Program Files\Dokan\Dokan Library-2.3.1"
          New-Item -ItemType Directory -Force -Path "$sdkRoot\include", "$sdkRoot\lib" | Out-Null

          $dokanH = Get-ChildItem -Recurse $msiExtract -Filter "dokan.h" | Select-Object -First 1
          if (-not $dokanH) {
            Write-Host "MSI extract tree:"; Get-ChildItem -Recurse $msiExtract | Select-Object FullName
            throw "dokan.h not found after MSI extraction"
          }
          Write-Host "Found dokan.h at: $($dokanH.FullName)"
          Get-ChildItem $dokanH.DirectoryName -Filter "*.h" | Copy-Item -Destination "$sdkRoot\include\"

          Get-ChildItem -Recurse $msiExtract -Filter "dokan2.lib" |
            Where-Object { $_.FullName -notmatch "x86" } |
            Select-Object -First 1 |
            Copy-Item -Destination "$sdkRoot\lib\"

          if (-not (Test-Path "$sdkRoot\include\dokan.h")) { throw "dokan.h missing" }
          if (-not (Test-Path "$sdkRoot\lib\dokan2.lib"))  { throw "dokan2.lib missing" }
          Write-Host "Dokany SDK ready at $sdkRoot"

      - name: Build cppcryptfs (Release|x64)
        shell: cmd
        run: |
          msbuild cppcryptfs.sln ^
            /p:Configuration=Release ^
            /p:Platform=x64 ^
            /p:PlatformToolset=v143 ^
            /m ^
            /v:minimal

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cppcryptfs-x64-release
          path: |
            x64\Release\cppcryptfs.exe
            x64\Release\cppcryptfsctl.exe
